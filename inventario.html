<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Krystal · Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Raleway:wght@400;600&display=swap" rel="stylesheet"/>
    <style>
        :root{--navy:#0f0f1e;--navy2:#1a1a2e;--gold:#e0c97f;--teal:#2dd4bf;--white:#f0eff6;--gray:#8888aa}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--navy);color:var(--white);font-family:'Raleway',sans-serif;min-height:100vh}
        header{background:#16213e;border-bottom:1px solid var(--gold);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
        .header-left{display:flex;align-items:center;gap:1.2rem}
        .kr-logo-svg{width:42px;height:auto}
        .brand h1{font-family:'Barlow Condensed';font-size:1.3rem;text-transform:uppercase;margin:0}
        .user-badge{background:rgba(224,201,127,.15);border:1px solid rgba(224,201,127,.3);border-radius:20px;padding:.3rem .8rem;font-size:.75rem;color:var(--gold);display:flex;align-items:center;gap:.4rem}
        .btn-back{background:none;border:1px solid rgba(224,201,127,.3);color:var(--gold);border-radius:5px;padding:.3rem .7rem;font-size:.75rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem}
        .btn-back:hover{border-color:var(--gold);background:rgba(224,201,127,.1)}
        main{max-width:800px;margin:3rem auto;padding:0 1.5rem;width:100%}
        .card{background:var(--navy2);border:1px solid rgba(224,201,127,.15);border-radius:12px;padding:2.5rem}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem}
        .field{display:flex;flex-direction:column;gap:.6rem}
        label{font-size:.7rem;font-weight:600;color:var(--gray);text-transform:uppercase}
        input,select{background:rgba(255,255,255,.05);border:1px solid rgba(224,201,127,.2);border-radius:8px;padding:.85rem;color:var(--white);font-family:'Raleway',sans-serif}
        input:focus,select:focus{outline:none;border-color:var(--gold)}
        .btn-submit{background:var(--gold);color:var(--navy);padding:1.1rem;border:none;border-radius:8px;font-weight:700;cursor:pointer;text-transform:uppercase;width:100%;margin-top:2rem;font-family:'Raleway',sans-serif;font-size:1rem}
        .btn-submit:disabled{opacity:.5;cursor:not-allowed}
        #statusMsg{margin-top:1.5rem;padding:1rem;border-radius:8px;display:none;text-align:center;font-weight:600}
        .loading{background:rgba(224,201,127,.1);color:var(--gold);border:1px solid var(--gold)}
        .success{background:rgba(45,212,191,.1);color:var(--teal);border:1px solid var(--teal)}
        .error{background:rgba(229,57,53,.1);color:#ef9a9a;border:1px solid #ef9a9a}
    </style>
</head>
<body>

<header>
  <div class="header-left">
    <svg class="kr-logo-svg" viewBox="0 0 60 70" fill="none">
      <rect x="8" y="10" width="10" height="50" fill="white"/>
      <rect x="22" y="25" width="10" height="35" fill="white"/>
      <rect x="36" y="15" width="10" height="45" fill="white"/>
      <rect x="8" y="8" width="38" height="5" fill="#FFE600"/>
    </svg>
    <div class="brand"><h1>Krystal · Inventario</h1><p style="font-size:.78rem;color:var(--gray)">Registro de Entradas</p></div>
  </div>
  <div style="display:flex;align-items:center;gap:.8rem">
    <div class="user-badge">👤 <span id="userLabel">—</span></div>
    <a class="btn-back" href="index.html">← Menú</a>
  </div>
</header>

<main>
  <div class="card">
    <form id="miFormulario">
      <div class="form-grid">
        <div class="field"><label>ID Producto</label><input type="text" id="idProducto" required></div>
        <div class="field"><label>Descripción</label><input type="text" id="nombre" required></div>
        <div class="field"><label>Cantidad</label><input type="number" id="cantidad" value="1"></div>
        <div class="field"><label>Bodega</label>
          <select id="bodega">
            <option value="Krystal">Krystal</option>
            <option value="Carrera 30">Carrera 30</option>
            <option value="Teusaquillo">Teusaquillo</option>
          </select>
        </div>
        <div class="field"><label>Costo Unitario</label><input type="number" id="costoUnit" value="0"></div>
        <div class="field"><label>Fecha Factura</label><input type="date" id="fechaIngreso"></div>
      </div>
      <button type="submit" class="btn-submit" id="btnSubmit">Sincronizar Registro</button>
    </form>
    <div id="statusMsg"></div>
  </div>
</main>

<script>
// ─── VERIFICAR SESIÓN ─────────────────────────────────────────
const _user = sessionStorage.getItem('krystal_user');
if (!_user) window.location.href = 'index.html';
document.getElementById('userLabel').textContent = _user;

const SCRIPT_URL = localStorage.getItem('krystal_script_url') ||
  'https://script.google.com/macros/s/AKfycbxusVBQq9FjAMKrzabtrmjx7uSvyLJXtG3ZiTf7lCUExOvtgs73AzxbxPP91ltTg3wI/exec';

document.getElementById('fechaIngreso').value = new Date().toISOString().split('T')[0];

document.getElementById('miFormulario').addEventListener('submit', function(e) {
  e.preventDefault();
  const msg = document.getElementById('statusMsg');
  const btn = document.getElementById('btnSubmit');
  msg.textContent = '⏳ Procesando...';
  msg.className = 'loading'; msg.style.display = 'block';
  btn.disabled = true;

  const datos = {
    action:       'saveInventario',
    usuario:      _user,
    idProducto:   document.getElementById('idProducto').value,
    nombre:       document.getElementById('nombre').value,
    cantidad:     document.getElementById('cantidad').value,
    bodega:       document.getElementById('bodega').value,
    costoUnit:    document.getElementById('costoUnit').value,
    fechaIngreso: document.getElementById('fechaIngreso').value
  };

  fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', cache:'no-cache', body: JSON.stringify(datos) })
  .then(() => {
    msg.textContent = '✔ ¡Registro guardado exitosamente!';
    msg.className = 'success';
    document.getElementById('miFormulario').reset();
    document.getElementById('fechaIngreso').value = new Date().toISOString().split('T')[0];
    btn.disabled = false;
    setTimeout(() => { msg.style.display = 'none'; }, 5000);
  })
  .catch(() => {
    msg.textContent = '❌ Error al conectar';
    msg.className = 'error';
    btn.disabled = false;
  });
});
</script>
</body>
</html>
